version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: modaco
      POSTGRES_PASSWORD: modaco_password
      POSTGRES_DB: modaco_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://modaco:modaco_password@db:5432/modaco_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

volumes:
  pgdata:
